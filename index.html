<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Expense Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h1>Daily Expense Manager</h1>
      <p>Purchase, salary and other expenses</p>
    </div>
  </header>

  <main class="container">
    <section class="summary-grid">
      <div class="summary-card">
        <span>Total Purchase</span>
        <strong id="purchaseTotal">₹0</strong>
      </div>
      <div class="summary-card">
        <span>Total Salary</span>
        <strong id="salaryTotal">₹0</strong>
      </div>
      <div class="summary-card">
        <span>Total Expense</span>
        <strong id="expenseTotal">₹0</strong>
      </div>
      <div class="summary-card total">
        <span>Grand Total</span>
        <strong id="grandTotal">₹0</strong>
      </div>
    </section>

    <section class="tabs">
      <button class="tab-btn active" data-tab="entryTab">Add Records</button>
      <button class="tab-btn" data-tab="adminTab">Admin View</button>
    </section>

    <section id="entryTab" class="tab-panel">
      <div class="forms-grid">
        <div class="card">
          <h2>Add Purchase</h2>
          <form id="purchaseForm">
            <label for="purchaseItem">Item Name</label>
            <input id="purchaseItem" type="text" required />

            <label for="purchaseQty">Quantity</label>
            <input id="purchaseQty" type="number" min="1" required />

            <label for="purchasePrice">Unit Price</label>
            <input id="purchasePrice" type="number" min="0" required />

            <label for="purchaseSupplier">Supplier</label>
            <input id="purchaseSupplier" type="text" />

            <label for="purchaseDate">Date</label>
            <input id="purchaseDate" type="date" required />

            <label for="purchaseBill">Bill Image</label>
            <input id="purchaseBill" type="file" accept="image/*" />

            <button type="submit">Save Purchase</button>
          </form>
        </div>

        <div class="card">
          <h2>Add Worker Salary</h2>
          <form id="salaryForm">
            <label for="salaryWorker">Worker Name</label>
            <input id="salaryWorker" type="text" required />

            <label for="salaryAmount">Amount</label>
            <input id="salaryAmount" type="number" min="0" required />

            <label for="salaryType">Salary Type</label>
            <select id="salaryType">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>

            <label for="salaryDate">Paid Date</label>
            <input id="salaryDate" type="date" required />

            <label for="salaryNote">Note</label>
            <textarea id="salaryNote" rows="4"></textarea>

            <label for="salaryBill">Bill Image</label>
            <input id="salaryBill" type="file" accept="image/*" />

            <button type="submit">Save Salary</button>
          </form>
        </div>

        <div class="card">
          <h2>Add Other Expense</h2>
          <form id="expenseForm">
            <label for="expenseCategory">Category</label>
            <select id="expenseCategory">
              <option value="Transport">Transport</option>
              <option value="Food">Food</option>
              <option value="Electricity">Electricity</option>
              <option value="Rent">Rent</option>
              <option value="Maintenance">Maintenance</option>
              <option value="Other">Other</option>
            </select>

            <label for="expenseAmount">Amount</label>
            <input id="expenseAmount" type="number" min="0" required />

            <label for="expenseDate">Date</label>
            <input id="expenseDate" type="date" required />

            <label for="expenseNote">Note</label>
            <textarea id="expenseNote" rows="4"></textarea>

            <label for="expenseBill">Bill Image</label>
            <input id="expenseBill" type="file" accept="image/*" />

            <button type="submit">Save Expense</button>
          </form>
        </div>
      </div>
    </section>

    <section id="adminTab" class="tab-panel hidden">
      <div class="card">
        <div class="admin-header">
          <h2>Admin Records</h2>
          <div class="filters">
            <select id="filterType">
              <option value="All">All Types</option>
              <option value="Purchase">Purchase</option>
              <option value="Salary">Salary</option>
              <option value="Expense">Expense</option>
            </select>
            <input id="filterDate" type="date" />
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Name / Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Details</th>
                <th>Bill</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="recordsTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
